<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menta y Amor</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#c8f7d4,#e9fff2);
}

/* BIENVENIDA */

.bienvenida{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#27ae60,#6ee7a8);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:10;
}

.bienvenida h1{
font-size:65px;
margin:10px;
}

.bienvenida p{
font-size:24px;
margin-bottom:20px;
}

.bienvenida button{
padding:16px 35px;
font-size:20px;
background:white;
color:#27ae60;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

.bienvenida button:hover{
transform:scale(1.1);
}

/* HEADER */

header{
background:#1e8449;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
}

/* PRODUCTOS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding:50px;
}

.producto{
background:white;
padding:25px;
border-radius:20px;
width:280px;
text-align:center;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.producto img{
width:200px;
}

.precio{
font-size:24px;
color:#2ecc71;
font-weight:bold;
}

button{
background:#2ecc71;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
margin:6px;
}

button:hover{
background:#27ae60;
}

/* CARRITO */

.carrito-panel{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.3);
padding:20px;
overflow:auto;
}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

/* MODALES */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px;
}

</style>

</head>

<body>

<!-- BIENVENIDA -->

<div class="bienvenida" id="bienvenida">

<h1>🌿 Menta y Amor</h1>

<p>Bienvenido, gracias por visitar Menta y Amor</p>

<button onclick="entrar()">Entrar a la tienda</button>

<a href="https://TUUSUARIO.github.io/menta-y-amor" target="_blank">
<button>🌐 Abrir en otro dispositivo</button>
</a>

</div>

<header>

<div class="logo">🌿 Menta y Amor</div>

</header>

<!-- PRODUCTOS -->

<div class="container">

<div class="producto">

<h3>Aromatizante 30ml</h3>

<img src="producto30ml.png">

<p>Aroma concentrado de menta.</p>

<p class="precio">$50 MXN</p>

<button onclick="verProducto('Aromatizante 30ml','$50','producto30ml.png')">Ver</button>

<button onclick="agregar('Aromatizante 30ml','$50')">Agregar</button>

</div>

<div class="producto">

<h3>Aromatizante 1 Litro</h3>

<img src="producto1l.png">

<p>Aromatizante grande para hogar.</p>

<p class="precio">$150 MXN</p>

<button onclick="verProducto('Aromatizante 1 Litro','$150','producto1l.png')">Ver</button>

<button onclick="agregar('Aromatizante 1 Litro','$150')">Agregar</button>

</div>

</div>

<!-- CARRITO -->

<div class="carrito-panel">

<h3>🛒 Carrito</h3>

<div id="lista"></div>

<button onclick="comprar()">Comprar</button>

</div>

<!-- VISTA PREVIA -->

<div class="modal" id="modal">

<div class="modal-content">

<h3 id="productoVista"></h3>

<img id="imagenVista" width="140">

<p id="precioVista"></p>

<button onclick="cerrar()">Cerrar</button>

</div>

</div>

<!-- FORMULARIO -->

<div class="modal" id="formulario">

<div class="modal-content">

<h3>Finalizar compra</h3>

<input type="text" id="correo" placeholder="Correo electrónico">

<label>
<input type="checkbox" id="edad">
Soy mayor de edad
</label>

<br><br>

<button onclick="finalizar()">Confirmar compra</button>

</div>

</div>

<script>

let carrito=[];

function entrar(){
document.getElementById("bienvenida").style.display="none";
}

function agregar(nombre,precio){
carrito.push(nombre+" "+precio);
mostrar();
}

function mostrar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
carrito.forEach(item=>{
lista.innerHTML += "<div class='item'>"+item+"</div>";
});
}

function verProducto(nombre,precio,imagen){

document.getElementById("modal").style.display="flex";

document.getElementById("productoVista").innerText=nombre;

document.getElementById("precioVista").innerText=precio;

document.getElementById("imagenVista").src=imagen;

}

function cerrar(){
document.getElementById("modal").style.display="none";
}

function comprar(){

if(carrito.length==0){
alert("Tu carrito está vacío");
return;
}

document.getElementById("formulario").style.display="flex";

}

function finalizar(){

let correo=document.getElementById("correo").value;
let edad=document.getElementById("edad").checked;

let formatoCorreo=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!formatoCorreo.test(correo)){
alert("Correo no válido");
return;
}

if(!edad){
alert("Debes confirmar que eres mayor de edad");
return;
}

alert("Compra realizada correctamente 🌿");

document.getElementById("formulario").style.display="none";

carrito=[];
mostrar();

}

</script>

</body>
</html>
