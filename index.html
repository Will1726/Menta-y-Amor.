<style>
/* GLOBAL */
body{

    width:45%;

.modalContenido{
    background:white;
    border-radius:15px;
    padding:20px;
    max-width:400px;
    width:90%;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s ease;
}
.modalProducto.show .modalContenido{
    transform: scale(1);
    opacity:1;
}
.modalContenido img{
    max-width:100%;
    margin-bottom:15px;
}

/* RESEÑAS */
.reseñas{
    background:white;
    padding:40px;
    text-align:center;
}
.review{
    display:flex;
    align-items:center;
    gap:10px;
    background:#f4fff7;
    padding:10px;
    margin:10px auto;
    max-width:500px;
    border-radius:10px;
}
.likes{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:5px;
}

.likes button{
    background:#eee;
    color:#333;
    border-radius:50%;

}

.likes button:hover{
    background:#2ecc71;
    color:white;
}
.like-btn{
    background:#eafaf1;
    color:#27ae60;
    border:none;
    padding:5px 10px;
    border-radius:8px;

}

.like-btn:hover{
    background:#2ecc71;
    color:white;
}

.like-btn.liked{
    background:#27ae60;
    color:white;
}

/* 🔥 animación */
@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

.like-anim{
    animation:pop 0.3s ease;
}
.review img{
    width:40px;
    height:40px;
    border-radius:50%;
}
.estrellas{
    color:gold;
}
.like-btn{
    background:#ffecec;
    color:#e74c3c;
    border:none;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.like-btn:hover{
    background:#ffb3b3;
}

/* ❤️ cuando ya dio like */
.like-btn.liked{
    background:#e74c3c;
    color:white;
    box-shadow:0 0 10px #e74c3c;
}

/* 💥 animación */
@keyframes likePop{
    0%{transform:scale(1);}
    50%{transform:scale(1.4);}
    100%{transform:scale(1);}
}

.like-anim{
    animation:likePop 0.3s ease;
}
/* MODAL TOAST */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#2ecc71;
    color:white;
    padding:15px 25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.5s, bottom 0.5s;
    z-index:1000;
}
.toast.show{
    opacity:1;
    bottom:50px;
}
.respuestas{
    margin-top:10px;
    text-align:left;
    font-size:13px;
}

.respuestas p{
    background:#ecfdf5;
    padding:5px;
    border-radius:6px;
    margin:3px 0;
}
.slider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.slider img{
    width:200px;
    border-radius:10px;
    transition:0.3s;
}
</style>

<header>
<div class="logo">🌿 Menta y Amor</div>

</header>

<div class="container">

</select>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let usuarioActual = null;

// actualizar contador al iniciar
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("contadorCarrito").innerText = carrito.length;
});

// CONFIG 
const firebaseConfig = {
  apiKey: "AIzaSyC7x-YoiGFlcFSCVG3Q0dMK_YXBVA-KzDw",
  authDomain: "menta-y-amor.firebaseapp.com",
  projectId: "menta-y-amor",
  storageBucket: "menta-y-amor.firebasestorage.app",
 mensajesSenderId: "591609204180",
  appId: "1:591609204180:web:f901f517f1fd4187121a41"}; InicializarFirebase const app = initializeApp(firebaseConfig);
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// Admin
function esAdmin(){
    return usuarioActual === "willduran620@gmail.com";
}

// LOGIN
firebase.auth().onAuthStateChanged(user => {
    if(user){
        usuarioActual = user.email;
        document.getElementById("login").style.display = "none";
    } else {
        document.getElementById("login").style.display = "flex";
    }
});

// FUNCIÓN ENTRAR
function entrar(){

    let correo = document.getElementById("correo").value;
    let pass = document.getElementById("password").value;

    let captcha = grecaptcha.getResponse();

    if(captcha.length === 0){
        mostrarToast("Verifica el captcha");
        return;
    }

    if(correo=="" || pass==""){
        mostrarToast("Completa los datos");
        return;
    }

    firebase.auth().signInWithEmailAndPassword(correo, pass)
    .then(userCredential => {
    usuarioActual = userCredential.user.email;
    mostrarToast("Bienvenido");
    grecaptcha.reset();
})
    .catch(error => {

        if(error.code === "auth/user-not-found"){
            firebase.auth().createUserWithEmailAndPassword(correo, pass)
            .then(userCredential => {
                usuarioActual = userCredential.user.email;
                mostrarToast("Cuenta creada 🎉");
            });
        } 
        else if(error.code === "auth/wrong-password"){
            mostrarToast("Contraseña incorrecta");
        }
        else{
            mostrarToast(error.message);
        }
    });
}
// CARRITO
function agregar(nombre,precio){

    let productoExistente = carrito.find(p => p.nombre === nombre);

    if(productoExistente){
        productoExistente.cantidad += 1;
    } else {
        carrito.push({nombre,precio,cantidad:1});
    }

    localStorage.setItem("carrito", JSON.stringify(carrito));

    document.getElementById("contadorCarrito").innerText =
        carrito.reduce((acc,p)=>acc+p.cantidad,0);

    mostrarToast(`Agregado: ${nombre}`);
}
function abrirCarrito(){

    let html="";
    let total=0;

    carrito.forEach((p,index)=>{
        let sub = p.precio * p.cantidad;
        total += sub;

        html += `
        <div style="margin-bottom:10px;">
            <b>${p.nombre}</b><br>
            $${p.precio} x ${p.cantidad} = $${sub}<br>

            <button onclick="cambiarCantidad(${index}, -1)">➖</button>
            <button onclick="cambiarCantidad(${index}, 1)">➕</button>
            <button onclick="eliminarProducto(${index})">❌</button>
        </div>
        `;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = "Total: $" + total;
    document.getElementById("carrito").style.display = "block";
}
function cambiarCantidad(index, cambio){

    carrito[index].cantidad += cambio;

    if(carrito[index].cantidad <= 0){
        carrito.splice(index,1);
    }

    localStorage.setItem("carrito", JSON.stringify(carrito));

    document.getElementById("contadorCarrito").innerText =
        carrito.reduce((acc,p)=>acc+p.cantidad,0);

    abrirCarrito();
}

function eliminarProducto(index){
    carrito.splice(index,1);

    localStorage.setItem("carrito", JSON.stringify(carrito));

    document.getElementById("contadorCarrito").innerText =
        carrito.reduce((acc,p)=>acc+p.cantidad,0);

    abrirCarrito();
}

function cerrarCarrito(){document.getElementById("carrito").style.display="none";}
function cerrarPago(){document.getElementById("pago").style.display="none";}

function mostrarToast(txt){
    let t=document.getElementById("toast");
    t.innerText=txt;
    t.classList.add("show");
    setTimeout(()=>{t.classList.remove("show");},2000);
}

// VER PRODUCTO
let imagenesProducto = [];
let indiceActual = 0;
function verProducto(nombre, precio, imgs){
    imagenesProducto = imgs;
    indiceActual = 0;

    document.getElementById("modalNombre").innerText = nombre;
    document.getElementById("modalPrecio").innerText = "$" + precio;
    document.getElementById("modalImagen").src = imagenesProducto[indiceActual];

    let modal = document.getElementById("modalProducto");
    modal.style.display = "flex";
    setTimeout(()=>modal.classList.add("show"),50);
}
function siguiente(){
    indiceActual++;
    if(indiceActual >= imagenesProducto.length){
        indiceActual = 0;
    }
    document.getElementById("modalImagen").src = imagenesProducto[indiceActual];
}

function anterior(){
    indiceActual--;
    if(indiceActual < 0){
        indiceActual = imagenesProducto.length - 1;
    }
    document.getElementById("modalImagen").src = imagenesProducto[indiceActual];
}
function cerrarModalProducto(){
    let modal=document.getElementById("modalProducto");
    modal.classList.remove("show"); // animación salida
    setTimeout(()=>modal.style.display="none",300);
}

// PAGO
function irPago(){
    if(carrito.length==0){mostrarToast("No hay productos en el carrito"); return;}
    cerrarCarrito();
    document.getElementById("pago").style.display="flex";
}

function pagar(){

    let tarjeta = document.getElementById("tarjeta");
    let cvv = document.getElementById("cvv");

    if(tarjeta.value.length!=16){mostrarToast("Tarjeta inválida"); return;}
    if(cvv.value.length!=3){mostrarToast("CVV inválido"); return;}

    mostrarToast("Pago realizado con éxito ✅");
    cerrarPago();

    carrito = [];
    localStorage.removeItem("carrito");

    document.getElementById("contadorCarrito").innerText = "0";
}

// --- RESEÑAS CON TROLEO ---
const fotosTroleo=[
    "https://sl.bing.net/jOZ3IVmuBr2",
    "https://sl.bing.net/g1t14nmz7Ia",
    "https://sl.bing.net/ia40wTYIBcO",
    "https://sl.bing.net/i7Xa9GtkUaO",
    "https://sl.bing.net/bE2t7niJhKK"
];

function avatarCorreo(correo){
    if(correo==="willduran620@gmail.com") return "https://api.dicebear.com/7.x/initials/svg?seed="+correo;
    if(Math.random()<0.25){
        const indice=Math.floor(Math.random()*fotosTroleo.length);
        return fotosTroleo[indice];
    }
    return "https://api.dicebear.com/7.x/initials/svg?seed="+correo;
}


//  SOLO DEJAMOS ESTA FUNCIÓN (Firebase)
function cargarReviews(){

let contenedor=document.getElementById("listaReviews");

db.collection("reviews")
.orderBy("fecha","desc")
.onSnapshot(snapshot=>{

contenedor.innerHTML="";

snapshot.forEach(doc=>{

let r=doc.data();
let estrellas="⭐".repeat(r.estrellas);
let likes = r.likes || 0;
let puedeBorrar = (usuarioActual === r.correo || usuarioActual === "willduran620@gmail.com");

contenedor.innerHTML+=`

<div class="review" id="review-${doc.id}">

<img src="${avatarCorreo(r.correo)}">

<div>

<strong>${r.nombre}</strong>

<div class="estrellas">${estrellas}</div>

<p>${r.texto}</p>
<div class="respuestas">
${(r.respuestas || [])
.sort((a,b)=>a.fecha-b.fecha)
.map(resp =>`
<p>
<strong style="color:${resp.usuario.includes('Menta y Amor') ? '#27ae60' : '#000'}">
${resp.usuario}:
</strong> ${resp.texto}
</p>
`).join("")}
</div>

<div>
<input id="resp-${doc.id}" placeholder="Responder...">
<button onclick="responderReview('${doc.id}')">Responder</button>
</div>

<button id="like-${doc.id}" 
class="like-btn ${r.likedBy && r.likedBy.includes(usuarioActual) ? 'liked' : ''}" 
onclick="darLike('${doc.id}')">
❤️ ${likes}
</button>

${puedeBorrar ? `<button onclick="animarBorrado('${doc.id}','${r.correo}')">Eliminar</button>` : ""}

</div>

</div>

`;

});

});

}

function borrarReview(id,correo){

if(usuarioActual !== correo && usuarioActual !== "willduran620@gmail.com"){
    mostrarToast("No puedes borrar esta reseña");
    return;
}

let confirmar = confirm("¿Seguro que quieres eliminar esta reseña?");
if(!confirmar) return;

db.collection("reviews").doc(id).delete()
.then(()=>{
    mostrarToast("Reseña eliminada 🗑️");
});

}

// 🔥 BORRAR CON ANIMACIÓN
function animarBorrado(id,correo){

if(usuarioActual !== correo && usuarioActual !== "willduran620@gmail.com"){
    mostrarToast("No puedes borrar esta reseña");
    return;
}

let confirmar = confirm("¿Eliminar reseña?");
if(!confirmar) return;

let elemento = document.getElementById("review-"+id);

if(elemento){
    elemento.style.transition="0.4s";
    elemento.style.opacity="0";
    elemento.style.transform="translateX(-50px)";
}

setTimeout(()=>{
    db.collection("reviews").doc(id).delete()
    .then(()=>{
        mostrarToast("Reseña eliminada 🗑️");
    });
},400);

}

// LIKE (sin repetir)
function darLike(id){

    let user = usuarioActual || "anonimo";
    let ref = db.collection("reviews").doc(id);

    ref.get().then(doc=>{
        let data = doc.data();
        let likedBy = data.likedBy || [];

        if(likedBy.includes(user)){
            // ❌ QUITAR LIKE
            likedBy = likedBy.filter(u => u !== user);

            ref.update({
                likes: (data.likes || 1) - 1,
                likedBy: likedBy
            });

            mostrarToast("Like eliminado 💔");

        } else {
            // ❤️ DAR LIKE
            likedBy.push(user);

            ref.update({
                likes: (data.likes || 0) + 1,
                likedBy: likedBy
            });

            mostrarToast("Like agregado ❤️");
        }
    });
}

function responderReview(id){

let input = document.getElementById("resp-"+id);
let texto = input.value;

// evitar respuestas vacías
if(texto.trim() == ""){
    mostrarToast("Escribe una respuesta");
    return;
}

let ref = db.collection("reviews").doc(id);

ref.get().then(doc=>{

});

}
